<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Settings — Nexora HRM</title>
  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/pages.css">
</head>
<body data-page="settings">

  <div class="app-shell">
    <aside id="sidebar" class="sidebar"></aside>

    <div class="main-content">
      <header class="page-header">
        <div class="page-header__left">
          <button id="menu-toggle" class="btn btn--ghost btn--icon" aria-label="Toggle menu">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 12h18M3 6h18M3 18h18"/></svg>
          </button>
          <div>
            <h1 class="page-header__title">Settings</h1>
            <div class="page-header__breadcrumb">System / Configuration</div>
          </div>
        </div>
      </header>

      <main class="page-body">
        <div class="settings-layout">
          <!-- Settings navigation tabs -->
          <nav class="settings-nav" aria-label="Settings sections">
            <button class="settings-nav__link active" data-panel="panel-company">Company Profile</button>
            <button class="settings-nav__link" data-panel="panel-notifications">Notifications</button>
            <button class="settings-nav__link" data-panel="panel-security">Security</button>
            <button class="settings-nav__link" data-panel="panel-integrations">Integrations</button>
          </nav>

          <div>
            <!-- Company profile panel -->
            <div id="panel-company" class="settings-panel card">
              <div class="card__header"><span class="card__title">Company Profile</span></div>
              <div class="card__body">
                <form>
                  <div class="form-group">
                    <label>Company Name</label>
                    <input class="form-control" value="Nexora Inc.">
                  </div>
                  <div class="form-row">
                    <div class="form-group">
                      <label>Industry</label>
                      <input class="form-control" value="Technology">
                    </div>
                    <div class="form-group">
                      <label>Company Size</label>
                      <select class="form-control">
                        <option>51–200 employees</option>
                        <option>201–500 employees</option>
                        <option>500+ employees</option>
                      </select>
                    </div>
                  </div>
                  <div class="form-group">
                    <label>Headquarters Address</label>
                    <textarea class="form-control" rows="2">1200 Innovation Drive, San Francisco, CA 94105</textarea>
                  </div>
                  <div class="form-row">
                    <div class="form-group">
                      <label>HR Contact Email</label>
                      <input class="form-control" type="email" value="hr@nexora.io">
                    </div>
                    <div class="form-group">
                      <label>Phone</label>
                      <input class="form-control" value="+1 (555) 000-0100">
                    </div>
                  </div>
                </form>
              </div>
              <div class="card__footer">
                <button class="btn btn--primary" data-save-settings>Save Changes</button>
              </div>
            </div>

            <!-- Notifications panel -->
            <div id="panel-notifications" class="settings-panel card" style="display:none">
              <div class="card__header"><span class="card__title">Notification Preferences</span></div>
              <div class="card__body">
                <form>
                  <div class="form-group">
                    <label style="display:flex;align-items:center;gap:8px;cursor:pointer">
                      <input type="checkbox" checked> Email alerts for new leave requests
                    </label>
                  </div>
                  <div class="form-group">
                    <label style="display:flex;align-items:center;gap:8px;cursor:pointer">
                      <input type="checkbox" checked> Notify on payroll completion
                    </label>
                  </div>
                  <div class="form-group">
                    <label style="display:flex;align-items:center;gap:8px;cursor:pointer">
                      <input type="checkbox"> Weekly headcount summary
                    </label>
                  </div>
                  <div class="form-group">
                    <label style="display:flex;align-items:center;gap:8px;cursor:pointer">
                      <input type="checkbox" checked> Candidate stage change alerts
                    </label>
                  </div>
                  <div class="form-group">
                    <label style="display:flex;align-items:center;gap:8px;cursor:pointer">
                      <input type="checkbox"> Training enrollment reminders
                    </label>
                  </div>
                </form>
              </div>
              <div class="card__footer">
                <button class="btn btn--primary" data-save-settings>Save Preferences</button>
              </div>
            </div>

            <!-- Security panel -->
            <div id="panel-security" class="settings-panel card" style="display:none">
              <div class="card__header"><span class="card__title">Security Settings</span></div>
              <div class="card__body">
                <form>
                  <div class="form-group">
                    <label>Session Timeout (minutes)</label>
                    <input class="form-control" type="number" value="30">
                  </div>
                  <div class="form-group">
                    <label style="display:flex;align-items:center;gap:8px;cursor:pointer">
                      <input type="checkbox" checked> Require two-factor authentication
                    </label>
                  </div>
                  <div class="form-group">
                    <label style="display:flex;align-items:center;gap:8px;cursor:pointer">
                      <input type="checkbox" checked> Enforce strong password policy
                    </label>
                  </div>
                  <div class="form-group">
                    <label>IP Allowlist (comma-separated)</label>
                    <input class="form-control" placeholder="192.168.1.0/24">
                  </div>
                </form>
              </div>
              <div class="card__footer">
                <button class="btn btn--primary" data-save-settings>Update Security</button>
              </div>
            </div>

            <!-- Integrations panel -->
            <div id="panel-integrations" class="settings-panel card" style="display:none">
              <div class="card__header"><span class="card__title">Integrations</span></div>
              <div class="card__body">
                <div style="display:flex;flex-direction:column;gap:16px">
                  <div class="benefit-item">
                    <div class="benefit-item__icon"><span style="font-weight:700">G</span></div>
                    <div style="flex:1">
                      <div class="benefit-item__title">Google Workspace</div>
                      <div class="benefit-item__desc">SSO and calendar sync</div>
                    </div>
                    <span class="badge badge--success">Connected</span>
                  </div>
                  <div class="benefit-item">
                    <div class="benefit-item__icon"><span style="font-weight:700">S</span></div>
                    <div style="flex:1">
                      <div class="benefit-item__title">Slack</div>
                      <div class="benefit-item__desc">HR notifications and alerts</div>
                    </div>
                    <button class="btn btn--secondary btn--sm">Connect</button>
                  </div>
                  <div class="benefit-item">
                    <div class="benefit-item__icon"><span style="font-weight:700">Q</span></div>
                    <div style="flex:1">
                      <div class="benefit-item__title">QuickBooks</div>
                      <div class="benefit-item__desc">Payroll accounting sync</div>
                    </div>
                    <button class="btn btn--secondary btn--sm">Connect</button>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>
      </main>
    </div>
  </div>

  <script src="js/data.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/components/modal.js"></script>
  <script src="js/components/toast.js"></script>
  <script src="js/components/table.js"></script>
  <script src="js/components/sidebar.js"></script>
  <script src="js/pages/settings.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
