<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Attendance — Nexora HRM</title>
  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/pages.css">
</head>
<body data-page="attendance">

  <div class="app-shell">
    <aside id="sidebar" class="sidebar"></aside>

    <div class="main-content">
      <header class="page-header">
        <div class="page-header__left">
          <button id="menu-toggle" class="btn btn--ghost btn--icon" aria-label="Toggle menu">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 12h18M3 6h18M3 18h18"/></svg>
          </button>
          <div>
            <h1 class="page-header__title">Attendance</h1>
            <div class="page-header__breadcrumb">Operations / Attendance Tracking</div>
          </div>
        </div>
      </header>

      <main class="page-body">
        <div class="grid-2" style="margin-bottom:var(--space-xl)">
          <!-- Monthly calendar heatmap -->
          <div class="card">
            <div class="card__header">
              <span class="card__title">June 2026 Calendar</span>
              <div style="display:flex;gap:12px;font-size:0.75rem">
                <span><span class="badge badge--success" style="margin-right:4px">?</span> Present</span>
                <span><span class="badge badge--danger" style="margin-right:4px">?</span> Absent</span>
                <span><span class="badge badge--warning" style="margin-right:4px">?</span> Leave</span>
              </div>
            </div>
            <div class="card__body">
              <div id="attendance-calendar"></div>
            </div>
          </div>

          <!-- Attendance summary stats -->
          <div class="grid-2" style="gap:var(--space-md)">
            <div class="stat-card">
              <div class="stat-card__label">Present Today</div>
              <div class="stat-card__value">4</div>
            </div>
            <div class="stat-card">
              <div class="stat-card__label">Absent Today</div>
              <div class="stat-card__value" style="color:var(--color-danger)">1</div>
            </div>
            <div class="stat-card">
              <div class="stat-card__label">On Leave</div>
              <div class="stat-card__value" style="color:var(--color-warning)">1</div>
            </div>
            <div class="stat-card">
              <div class="stat-card__label">Avg. Hours</div>
              <div class="stat-card__value">8.5h</div>
            </div>
          </div>
        </div>

        <!-- Daily attendance log -->
        <div class="card">
          <div class="card__header"><span class="card__title">Today's Attendance Log</span></div>
          <div class="card__body" style="padding:0">
            <div id="attendance-table"></div>
          </div>
        </div>
      </main>
    </div>
  </div>

  <script src="js/data.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/components/modal.js"></script>
  <script src="js/components/toast.js"></script>
  <script src="js/components/table.js"></script>
  <script src="js/components/sidebar.js"></script>
  <script src="js/pages/attendance.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
