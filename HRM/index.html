<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard � Nexora HRM</title>
  <!-- Design system stylesheets (order matters) -->
  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/pages.css">
</head>
<body data-page="dashboard">

  <div class="app-shell">
    <!-- Sidebar navigation (rendered by sidebar.js) -->
    <aside id="sidebar" class="sidebar" aria-label="Sidebar"></aside>

    <div class="main-content">
      <!-- Sticky page header -->
      <header class="page-header">
        <div class="page-header__left">
          <button id="menu-toggle" class="btn btn--ghost btn--icon" aria-label="Toggle menu">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 12h18M3 6h18M3 18h18"/></svg>
          </button>
          <div>
            <h1 class="page-header__title">Dashboard</h1>
            <div class="page-header__breadcrumb">Overview / Dashboard</div>
          </div>
        </div>
        <div class="page-header__right">
          <span style="font-size:0.8125rem;color:var(--color-text-muted)">Sunday, Jun 7, 2026</span>
        </div>
      </header>

      <main class="page-body">
        <!-- Welcome banner -->
        <div class="dashboard-welcome">
          <h1>Good morning,Mr. Emmanuel<main></main></h1>
          <p>Here's what's happening across your organization today.</p>
        </div>

        <!-- KPI stat cards -->
        <div id="stats-grid" class="grid-4" style="margin-bottom:var(--space-xl)"></div>

        <!-- Charts and activity row -->
        <div class="grid-2" style="margin-bottom:var(--space-xl)">
          <div class="card">
            <div class="card__header">
              <span class="card__title">Headcount Trend</span>
              <span class="badge badge--accent">+8% YoY</span>
            </div>
            <div class="card__body">
              <div id="headcount-chart" class="chart-placeholder"></div>
            </div>
          </div>

          <div class="card">
            <div class="card__header">
              <span class="card__title">Recent Activity</span>
            </div>
            <div class="card__body">
              <div id="activity-feed"></div>
            </div>
          </div>
        </div>

        <!-- Quick actions -->
        <div class="card">
          <div class="card__header">
            <span class="card__title">Quick Actions</span>
          </div>
          <div class="card__body">
            <div id="quick-actions" style="display:flex;gap:12px;flex-wrap:wrap"></div>
          </div>
        </div>
      </main>
    </div>
  </div>

  <!-- Shared scripts -->
  <script src="js/data.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/components/modal.js"></script>
  <script src="js/components/toast.js"></script>
  <script src="js/components/table.js"></script>
  <script src="js/components/sidebar.js"></script>
  <!-- Page-specific script -->
  <script src="js/pages/dashboard.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
