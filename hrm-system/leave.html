<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Leave Management — Nexora HRM</title>
  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/pages.css">
</head>
<body data-page="leave">

  <div class="app-shell">
    <aside id="sidebar" class="sidebar"></aside>

    <div class="main-content">
      <header class="page-header">
        <div class="page-header__left">
          <button id="menu-toggle" class="btn btn--ghost btn--icon" aria-label="Toggle menu">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 12h18M3 6h18M3 18h18"/></svg>
          </button>
          <div>
            <h1 class="page-header__title">Leave Management</h1>
            <div class="page-header__breadcrumb">Operations / Leave Requests</div>
          </div>
        </div>
        <div class="page-header__right">
          <button id="request-leave-btn" class="btn btn--primary">Request Leave</button>
        </div>
      </header>

      <main class="page-body">
        <!-- Leave balance cards -->
        <div id="leave-balances" class="grid-3" style="margin-bottom:var(--space-xl)"></div>

        <!-- Leave requests table -->
        <div class="card">
          <div class="card__header"><span class="card__title">Leave Requests</span></div>
          <div class="card__body" style="padding:0">
            <div id="leave-table"></div>
          </div>
        </div>
      </main>
    </div>
  </div>

  <script src="js/data.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/components/modal.js"></script>
  <script src="js/components/toast.js"></script>
  <script src="js/components/table.js"></script>
  <script src="js/components/sidebar.js"></script>
  <script src="js/pages/leave.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
